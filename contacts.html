<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senso — Contacts</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1000">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon.png?v=1000">
    <link rel="apple-touch-icon" href="favicon.png?v=1000">

    <style>
        @font-face {
            font-family: 'FuturaLight';
            src: url('Fonts/futura light bt.ttf') format('truetype');
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { opacity: 0; animation: fadeIn 1.5s ease-out forwards; }
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.8s; }
        .delay-3 { animation-delay: 1.3s; }

        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'FuturaLight', sans-serif;
            -webkit-font-smoothing: antialiased;
            text-align: center;
            overflow-x: hidden;
        }

        .back-home {
            position: fixed; top: 25px; left: 20px;
            text-decoration: none; color: #fff;
            text-transform: uppercase; font-size: 0.65rem;
            letter-spacing: 2px; opacity: 0.5; z-index: 1000;
            transition: 0.3s;
        }
        .back-home:hover { opacity: 1; }

        .isotipo-header {
            width: 90px; height: auto;
            margin-top: 100px; margin-bottom: 60px;
            filter: brightness(0) invert(1);
        }

        .contact-links { margin-bottom: 60px; }
        .contact-links a {
            display: block; color: #fff; text-decoration: none;
            font-size: 1.1rem; letter-spacing: 2px;
            margin: 15px 0; opacity: 0.8; transition: 0.3s;
        }
        .contact-links a:hover { opacity: 1; }

        .newsletter-box {
            max-width: 500px; width: 85%;
            border-top: 1px solid #1a1a1a;
            padding-top: 50px; margin-bottom: 60px;
            position: relative;
            min-height: 250px; /* Evita salti di altezza */
        }

        .newsletter-box p {
            font-size: 1rem; letter-spacing: 1.5px;
            margin-bottom: 35px; opacity: 0.9; line-height: 1.8;
        }

        /* Gestione stati Form e Successo */
        #form-content { transition: opacity 0.8s ease; }
        
        #success-message {
            display: none;
            opacity: 0;
            transition: opacity 1.2s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            padding: 40px 0;
        }

        .form-group { display: flex; flex-direction: column; gap: 15px; }
        
        input {
            background: transparent; border: none;
            border-bottom: 1px solid #333; color: #fff;
            padding: 10px 5px; font-family: 'FuturaLight', sans-serif;
            font-size: 0.75rem; letter-spacing: 2px;
            outline: none; text-transform: uppercase; text-align: center;
        }

        .submit-btn {
            background: none; border: 1px solid #333;
            color: #fff; padding: 14px; margin-top: 20px;
            cursor: pointer; text-transform: uppercase;
            letter-spacing: 3px; font-size: 0.65rem; transition: 0.4s;
        }
        .submit-btn:hover:not(:disabled) { background: #fff; color: #000; }
        .submit-btn:disabled { opacity: 0.3; cursor: default; }

        .back-btn {
            background: none; border: none; color: #fff;
            font-family: 'FuturaLight', sans-serif;
            text-transform: uppercase; font-size: 0.55rem;
            letter-spacing: 3px; opacity: 0.4; cursor: pointer;
            transition: 0.3s; margin-top: 30px; padding: 10px;
        }
        .back-btn:hover { opacity: 1; }

        @media (max-width: 600px) {
            .isotipo-header { width: 75px; margin-top: 120px; }
            .newsletter-box p { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← Home</a>

    <header class="fade-in delay-1">
        <img src="senso_isotipo_negro.png" alt="SENSO Isotipo" class="isotipo-header">
    </header>

    <div class="contact-links fade-in delay-2">
        <a href="mailto:contact@senso-art.com">contact@senso-art.com</a>
        <a href="https://www.instagram.com/senso_art_/" target="_blank">@senso_art_</a>
    </div>

    <div id="newsletter-container" class="newsletter-box fade-in delay-3">
        <div id="form-content">
            <p>Get updates on artists, exhibitions, and events.</p>
            <form action="https://formspree.io/f/mgorwree" method="POST" class="form-group" id="contact-form">
                <input type="text" name="first_name" placeholder="First Name" required>
                <input type="text" name="last_name" placeholder="Last Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <button type="submit" class="submit-btn" id="submit-btn">Subscribe</button>
            </form>
        </div>

        <div id="success-message">
            <p>Your request has been received.<br>Thank you.</p>
            <button type="button" class="back-btn" onclick="resetForm()">BACK</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('contact-form');
        const formContent = document.getElementById('form-content');
        const successMessage = document.getElementById('success-message');
        const btn = document.getElementById('submit-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btn.innerText = "SENDING...";
            btn.disabled = true;

            const formData = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    // Sparizione fluida del form
                    formContent.style.opacity = "0";
                    setTimeout(() => {
                        formContent.style.display = "none";
                        successMessage.style.display = "block";
                        setTimeout(() => {
                            successMessage.style.opacity = "1";
                        }, 50);
                    }, 800);
                } else {
                    btn.innerText = "ERROR. TRY AGAIN.";
                    btn.disabled = false;
                }
            } catch (error) {
                btn.innerText = "CONNECTION ERROR.";
                btn.disabled = false;
            }
        };

        function resetForm() {
            // Sparizione fluida del messaggio di successo
            successMessage.style.opacity = "0";
            setTimeout(() => {
                successMessage.style.display = "none";
                formContent.style.display = "block";
                
                // Reset dati
                form.reset();
                btn.innerText = "SUBSCRIBE";
                btn.disabled = false;

                setTimeout(() => {
                    formContent.style.opacity = "1";
                }, 50);
            }, 800);
        }
    </script>

</body>
</html>
