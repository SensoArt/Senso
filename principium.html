<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senso — PRINCIPIUM</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        @font-face { 
            font-family: 'FuturaLight'; 
            src: url('Fonts/futura light bt.ttf') format('truetype'); 
        }

        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'FuturaLight', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .main-title {
            font-family: "Times New Roman", Times, serif !important;
            font-style: normal !important;
            font-weight: normal !important;
            font-size: clamp(2.2rem, 12vw, 8.5rem); 
            margin: 0;
            text-transform: uppercase;
            letter-spacing: clamp(4px, 1.2vw, 12px);
            line-height: 1;
            display: block;
            width: 90%;
        }

        .subtitle {
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            opacity: 0.5;
            margin: 20px 0 60px 0;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 40px);
            width: 100%;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            min-width: clamp(50px, 15vw, 90px);
        }

        .time-value {
            font-size: clamp(1.4rem, 6vw, 2.5rem);
            letter-spacing: 2px;
        }

        .label {
            font-size: clamp(0.45rem, 1.5vw, 0.55rem);
            opacity: 0.4;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .back-home {
            position: absolute;
            top: 25px;
            left: 20px;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 2px;
            opacity: 0.4;
            transition: 0.3s;
        }

        .back-home:hover { opacity: 1; }

        @media (max-width: 380px) {
            .main-title { font-size: 1.8rem; letter-spacing: 3px; }
            #countdown { gap: 8px; }
            .time-segment { min-width: 45px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← Home</a>

    <p class="subtitle">May 16, 2026 — Barcelona</p>

    <div id="countdown">
        <div class="time-segment"><span class="time-value" id="days">00</span><span class="label">DAYS</span></div>
        <div class="time-segment"><span class="time-value" id="hours">00</span><span class="label">HOURS</span></div>
        <div class="time-segment"><span class="time-value" id="minutes">00</span><span class="label">MINS</span></div>
        <div class="time-segment"><span class="time-value" id="seconds">00</span><span class="label">SECS</span></div>
    </div>
