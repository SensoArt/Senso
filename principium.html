<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senso — Principium</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1000">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon.png?v=1000">
    <link rel="apple-touch-icon" href="favicon.png?v=1000">

    <style>
        @font-face { 
            font-family: 'FuturaLight'; 
            src: url('Fonts/futura light bt.ttf') format('truetype'); 
        }

        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'FuturaLight', sans-serif;
            text-align: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* TITOLO: Estetica iniziale, Times New Roman, No corsivo */
        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: clamp(3.5rem, 12vw, 7rem);
            margin: 0;
            text-transform: lowercase;
            font-weight: normal; /* Assicura che non sia né grassetto né corsivo */
            font-style: normal;  /* Rimuove categoricamente il corsivo */
            letter-spacing: -2px;
            line-height: 1.1;
        }

        .subtitle {
            font-family: 'FuturaLight', sans-serif;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 0.75rem;
            opacity: 0.5;
            margin-top: 5px;
            margin-bottom: 80px;
        }

        #countdown {
            display: flex;
            gap: 45px;
            font-family: 'FuturaLight', sans-serif;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            min-width: 70px;
        }

        .time-value {
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: normal;
        }

        .label {
            font-size: 0.55rem;
            opacity: 0.4;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        .back-home {
            position: fixed;
            top: 25px;
            left: 20px;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .back-home:hover { opacity: 1; }

        @media (max-width: 600px) {
            h1 { font-size: 3.2rem; }
            #countdown { gap: 15px; }
            .time-segment { min-width: 55px; }
            .time-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← Home</a>

    <header>
        <h1>principium</h1>
        <p class="subtitle">May 16, 2026 — Barcelona</p>
    </header>

    <div id="countdown">
        <div class="time-segment">
            <span class="time-value" id="days">00</span>
            <span class="label">DAYS</span>
        </div>
        <div class="time-segment">
            <span class="time-value" id="hours">00</span>
            <span class="label">HOURS</span>
        </div>
        <div class="time-segment">
            <span class="time-value" id="minutes">00</span>
            <span class="label">MINS</span>
        </div>
        <div class="time-segment">
            <span class="time-value" id="seconds">00</span>
            <span class="label">SECS</span>
        </div>
    </div>

    <script>
        const targetDate = new Date("May 16, 2026 19:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById("days").innerText = d.toString().padStart(2, '0');
                document.getElementById("hours").innerText = h.toString().padStart(2, '0');
                document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
                document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
            } else {
                document.getElementById("countdown").innerText = "OPENING";
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
