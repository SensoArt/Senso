<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senso — Principium</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1000">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon.png?v=1000">
    <link rel="apple-touch-icon" href="favicon.png?v=1000">

    <style>
        @font-face { font-family: 'FuturaLight'; src: url('Fonts/futura light bt.ttf') format('truetype'); }
        @font-face { font-family: 'BehindNineties'; src: url('Fonts/Behind-The-Nineties-Md-It.otf') format('opentype'); }

        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'FuturaLight', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .bg-fade {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('sillas.jpg'); /* O l'immagine che preferisci */
            background-size: cover;
            background-position: center;
            opacity: 0.2; /* Molto soffusa */
            z-index: -1;
        }

        h1 {
            font-family: 'BehindNineties', serif;
            font-size: clamp(2rem, 7vw, 4rem);
            margin-bottom: 10px;
            text-transform: lowercase;
        }

        .subtitle {
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 50px;
        }

        #countdown {
            display: flex;
            gap: 30px;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .time-segment { display: flex; flex-direction: column; }
        .label { font-size: 0.6rem; opacity: 0.5; margin-top: 10px; letter-spacing: 2px; }

        .back-home {
            position: fixed;
            top: 25px;
            left: 20px;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="bg-fade"></div>
    <a href="index.html" class="back-home">← Home</a>

    <h1>principium</h1>
    <p class="subtitle">May 16, 2026 — Barcelona</p>

    <div id="countdown">
        <div class="time-segment"><span id="days">00</span><span class="label">DAYS</span></div>
        <div class="time-segment"><span id="hours">00</span><span class="label">HOURS</span></div>
        <div class="time-segment"><span id="minutes">00</span><span class="label">MINS</span></div>
        <div class="time-segment"><span id="seconds">00</span><span class="label">SECS</span></div>
    </div>

    <script>
        const targetDate = new Date("May 16, 2026 19:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
