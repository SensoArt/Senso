<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senso — Principium</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1000">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon.png?v=1000">
    <link rel="apple-touch-icon" href="favicon.png?v=1000">

    <style>
        @font-face { 
            font-family: 'FuturaLight'; 
            src: url('Fonts/futura light bt.ttf') format('truetype'); 
        }

        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'FuturaLight', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        /* ESTETICA ORIGINALE: 
           Times New Roman, dritto (normal), lowercase. 
        */
        h1 {
            font-family: "Times New Roman", Times, serif !important;
            font-style: normal !important;
            font-weight: normal !important;
            font-size: clamp(3.5rem, 12vw, 7rem);
            margin: 0;
            text-transform: lowercase;
            letter-spacing: -2px;
        }

        .subtitle {
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 0.75rem;
            opacity: 0.5;
            margin-top: 5px;
            margin-bottom: 80px;
        }

        #countdown {
            display: flex;
            gap: 45px;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            min-width: 70px;
        }

        .time-value {
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .label {
            font-size: 0.55rem;
            opacity: 0.4;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        .back-home {
            position: fixed;
            top: 25px;
            left: 20px;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            h1 { font-size: 3.2rem; }
            #countdown { gap: 15px; }
            .time-segment { min-width: 55px; }
            .time-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← Home</a>

    <h1>principium</h1>
    <p class="subtitle">May 16, 2026 — Barcelona</p>

    <div id="countdown">
        <div class="time-segment"><span class="time-value" id="days">00</span><span class="label">DAYS</span></div>
        <div class="time-segment"><span class="time-value" id="hours">00</span><span class="label">HOURS</span></div>
        <div class="time-segment"><span class="time-value" id="minutes">00</span><span class="label">MINS</span></div>
        <div class="time-segment"><span class="time-value" id="seconds">00</span><span class="label">SECS</span></div>
    </div>

    <script>
        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        function update() {
            const now = new Date().getTime();
            const d = targetDate - now;
            if (d > 0) {
                document.getElementById("days").innerText = Math.floor(d/(1000*60*60*24)).toString().padStart(2,'0');
                document.getElementById("hours").innerText = Math.floor((d%(1000*60*60*24))/(1000*60*60)).toString().padStart(2,'0');
                document.getElementById("minutes").innerText = Math.floor((d%(1000*60*60))/(1000*60)).toString().padStart(2,'0');
                document.getElementById("seconds").innerText = Math.floor((d%(1000*60))/1000).toString().padStart(2,'0');
            }
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
