<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senso — Principium</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        @font-face { 
            font-family: 'FuturaLight'; 
            src: url('Fonts/futura light bt.ttf') format('truetype'); 
        }

        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100dvh; /* dvh serve per il mobile, evita i problemi con la barra di Safari */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'FuturaLight', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        /* TITOLO: Times New Roman, dritto, adattivo */
        .main-title {
            font-family: "Times New Roman", Times, serif !important;
            font-style: normal !important;
            font-weight: normal !important;
            /* Si adatta perfettamente tra mobile e desktop */
            font-size: clamp(2.8rem, 10vw, 7rem); 
            margin: 0;
            text-transform: lowercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .subtitle {
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            opacity: 0.5;
            margin-top: 10px;
            margin-bottom: 8vh; /* Spazio fluido basato sull'altezza dello schermo */
        }

        /* COUNTDOWN ADATTIVO */
        #countdown {
            display: flex;
            gap: clamp(15px, 5vw, 45px);
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            min-width: clamp(45px, 12vw, 80px);
        }

        .time-value {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            letter-spacing: 1px;
        }

        .label {
            font-size: clamp(0.45rem, 1.5vw, 0.55rem);
            opacity: 0.4;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 2px;
            opacity: 0.4;
        }

        /* FIX SPECIFICO PER SCHERMI MOLTO PICCOLI */
        @media (max-height: 500px) {
            .subtitle { margin-bottom: 20px; }
            .main-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← Home</a>

    <div class="main-title">principium</div>
    <p class="subtitle">May 16, 2026 — Barcelona</p>

    <div id="countdown">
        <div class="time-segment"><span class="time-value" id="days">00</span><span class="label">DAYS</span></div>
        <div class="time-segment"><span class="time-value" id="hours">00</span><span class="label">HOURS</span></div>
        <div class="time-segment"><span class="time-value" id="minutes">00</span><span class="label">MINS</span></div>
        <div class="time-segment"><span class="time-value" id="seconds">00</span><span class="label">SECS</span></div>
    </div>

    <script>
        const targetDate = new Date("May 16, 2026 19:00:00").getTime();
        function update() {
            const now = new Date().getTime();
            const d = targetDate - now;
            if (d > 0) {
                document.getElementById("days").innerText = Math.floor(d/(1000*60*60*24)).toString().padStart(2,'0');
                document.getElementById("hours").innerText = Math.floor((d%(1000*60*60*24))/(1000*60*60)).toString().padStart(2,'0');
                document.getElementById("minutes").innerText = Math.floor((d%(1000*60*60))/(1000*60)).toString().padStart(2,'0');
                document.getElementById("seconds").innerText = Math.floor((d%(1000*60))/1000).toString().padStart(2,'0');
            }
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
