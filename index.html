        /* CARICAMENTO FONT - Assicurati che i file siano nella cartella /fonts */
        @font-face {
            font-family: 'BehindTheNineties';
            src: url('fonts/Behind-The-Nineties-It.woff2') format('woff2');
            font-style: italic;
        }
        @font-face {
            font-family: 'Gilroy-Light';
            src: url('fonts/Gilroy-Light.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Gilroy-ExtraBold';
            src: url('fonts/Gilroy-ExtraBold.woff2') format('woff2');
        }

        :root {
            --bg: #000;
            --white: #fff;
            --serif: 'BehindTheNineties', serif;
            --sans: 'Gilroy-Light', sans-serif;
            --sans-bold: 'Gilroy-ExtraBold', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            margin: 0;
            padding: 0;
            font-family: var(--sans);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 100px 20px 60px;
            width: 100%;
        }

        .main-title {
            font-family: var(--serif);
            font-size: clamp(3.5rem, 15vw, 9rem);
            text-transform: uppercase;
            line-height: 0.9;
            margin: 0;
            font-weight: normal;
        }

        .tagline {
            font-family: var(--serif);
            font-style: italic;
            font-size: clamp(1.2rem, 3vw, 2rem);
            margin-top: 20px;
            opacity: 0.9;
        }

        /* HERO IMAGE */
        .hero-container {
            width: 100%;
            max-width: 1100px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .hero-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* TESTO CURATORIALE - DOPPIA COLONNA */
        .curatorial-section {
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            padding: 80px 40px;
            text-align: justify;
        }

        .lang-column h3 {
            font-family: var(--serif);
            font-size: 1.8rem;
            margin-bottom: 30px;
            font-weight: normal;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .lang-column p {
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 25px;
            opacity: 0.85;
        }

        /* CITAZIONE CENTRALE */
        .experience-break {
            width: 100%;
            text-align: center;
            font-family: var(--serif);
            font-style: italic;
            font-size: clamp(2rem, 5vw, 3.5rem);
            padding: 60px 20px;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            margin: 40px 0;
        }

        /* LOGO SENSO */
        .logo-section {
            padding: 80px 20px;
            width: 100%;
            text-align: center;
        }

        .logo-section img {
            width: 280px;
            height: auto;
        }

        /* FOOTER INFO */
        footer {
            width: 100%;
            max-width: 1100px;
            padding: 40px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 60px;
        }

        .date-big {
            font-family: var(--sans-bold);
            font-size: 3rem;
            display: block;
            line-height: 1;
        }

        .details-text {
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

            text-align: right;
        }
