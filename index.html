<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>SENSO — Contemporary Art Expression</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <meta name="description" content="Independent art organization based in Barcelona. Exploring contemporary art expression through curated exhibitions and sensory experiences.">

    <style>
        @font-face {
            font-family: 'FuturaLight';
            src: url('Fonts/futura light bt.ttf') format('truetype');
        }

        body {
            background-color: #000; /* Nero assoluto */
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'FuturaLight', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .logo-home {
            width: 350px; 
            max-width: 80%;
            margin-bottom: 50px;
            /* TRUCCO PER MOBILE: Elimina il rettangolo nero differente */
            mix-blend-mode: screen; 
            filter: brightness(1.1);
        }

        nav {
            display: flex;
            gap: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 1;
        }

        @media (max-width: 600px) {
            nav { flex-direction: column; gap: 20px; }
            .logo-home { width: 280px; }
        }
    </style>
</head>
<body>

    <img src="senso_logo_blanco.png" alt="SENSO Logo" class="logo-home">

    <nav>
        <a href="principium.html">Principium (Current)</a>
        <a href="about.html">About</a>
        <a href="#">Archive</a>
        <a href="contacts.html">Contacts</a>
    </nav>

</body>
</html>
