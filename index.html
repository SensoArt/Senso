<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SENSO</title>

  <style>
    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family: Arial, sans-serif;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .wrap{
      max-width:700px;
      padding:40px;
    }

    h1{
      font-size:72px;
      letter-spacing:14px;
      font-weight:400;
      margin:0;
    }

    p{
      margin-top:30px;
      font-size:16px;
      opacity:0.7;
      line-height:1.8;
    }

    .tag{
      margin-top:40px;
      font-size:12px;
      letter-spacing:3px;
      opacity:0.4;
    }

    .contact{
      margin-top:60px;
      font-size:12px;
      opacity:0.5;
      letter-spacing:1px;
    }

    .contact a{
      color:#fff;
      text-decoration:none;
      opacity:0.8;
    }

    .contact a:hover{
      opacity:1;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>SENSO</h1>

    <p>
      An artistic project that transforms art into a journey.<br>
      Perception. Emotion. Direction.
    </p>

    <div class="tag">
      Where Art becomes experience
    </div>

    <div class="contact">
      contact: <a href="mailto:contact@senso-art.com">contact@senso-art.com</a>
    </div>
  </div>
</body>
</html>
