<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senso — Archive</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1000">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon.png?v=1000">
    <link rel="apple-touch-icon" href="favicon.png?v=1000">
    <meta name="theme-color" content="#000000">

    <style>
        @font-face {
            font-family: 'FuturaLight';
            src: url('Fonts/futura light bt.ttf') format('truetype');
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Drift ricalibrato per non uscire mai dai bordi */
        @keyframes gentleDrift {
            from { transform: scale(1.05); }
            to { transform: scale(1.15); }
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Taglia categoricamente qualsiasi pezzo in più */
            background-color: #000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'FuturaLight', sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #fff;
            text-align: center;
        }

        /* Lo sfondo ora è ancorato perfettamente ai bordi */
        .archive-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('archive_bg.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.35; 
            z-index: -2;
            animation: gentleDrift 20s infinite alternate ease-in-out;
            filter: grayscale(100%);
        }
        
        /* Overlay per profondità */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        .back-home {
            position: absolute;
            top: 25px;
            left: 20px;
            text-decoration: none;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.5;
            z-index: 10;
            transition: 0.3s;
        }

        .back-home:hover { opacity: 1; }

        .archive-content {
            z-index: 1;
            padding: 20px;
            animation: fadeIn 3s ease-in-out;
        }

        .status-text {
            font-size: 0.95rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.7;
            margin: 0;
        }

        /* FIX MOBILE: Rimuove ogni possibile spazio aggiunto */
        @media (max-width: 768px) {
            .status-text {
                font-size: 0.8rem;
                letter-spacing: 3px;
            }
            .back-home {
                top: 20px;
                left: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="archive-bg"></div>
    <div class="bg-overlay"></div>

    <a href="index.html" class="back-home">← Home</a>

    <div class="archive-content">
        <p class="status-text">Archive opening soon.</p>
    </div>

</body>
</html>
